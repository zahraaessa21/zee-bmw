<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEE-BMW | BMW Luxury Rentals</title>

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />

    <!-- Material Symbols icon font (used throughout the app) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <!--
      This <div id="root"> is where React mounts the entire app.
      In main.jsx we do: ReactDOM.createRoot(document.getElementById('root'))
      React replaces the contents of this div with all our components.
    -->
    <div id="root"></div>

    <!--
      This script tag loads our React app.
      Vite processes main.jsx and all its imports, bundles them,
      and serves the result here.
      type="module" means it uses ES6 import/export syntax.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
